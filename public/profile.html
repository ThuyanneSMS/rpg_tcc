<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Web - Minha Conta</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-wrapper {
            margin: 0 auto;
            max-width: 600px;
        }

        .info-box {
            background-color: #1c232c;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #3498db;
            margin-bottom: 20px;
            border-right: 1px solid #34495e;
            border-top: 1px solid #34495e;
            border-bottom: 1px solid #34495e;
        }

        .info-box p {
            margin-bottom: 8px;
            color: #bdc3c7;
        }

        .info-box strong {
            color: #ecf0f1;
        }
    </style>
</head>
<body>
    
    <div class="rpg-container fade-in">
        
        <!-- Sidebar Menu -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div>?? Ajustes</div>
            </div>
            <ul class="menu-list">
                <li class="menu-item"><a href="game.html">?? Status</a></li>
                <li class="menu-item"><a href="inventory.html">?? Inventário</a></li>
                <li class="menu-item active"><a href="profile.html">?? Minha Conta</a></li>
            </ul>
        </aside>

        <!-- Main Panel -->
        <main class="main-panel">
            <h2 class="section-title">Dados do Jogador</h2>
            
            <div class="profile-wrapper">
                <div id="msg"></div>

                <!-- Dados Fixos -->
                <div class="info-box">
                    <p><strong>Apelido:</strong> <span id="display_nickname" style="color:#f1c40f;">Carregando...</span></p>
                    <p><strong>E-mail:</strong> <span id="display_email">Carregando...</span></p>
                    <p style="font-size: 12px; color: #7f8c8d; margin-top: 10px;">(Pactos Mágicos não permitem alteração nestes campos)</p>
                </div>

                <form id="profileForm" class="rpg-box">
                    <h3 style="margin-bottom: 15px;" class="cinzel">Atualizar Ficha</h3>
                    <div class="form-group">
                        <label for="full_name">Nome Verdadeiro</label>
                        <input type="text" id="full_name" required>
                    </div>
                    
                    <div class="rpg-grid">
                        <div class="form-group">
                            <label for="age">Idade</label>
                            <input type="number" id="age" required>
                        </div>
                        <div class="form-group">
                            <label for="gender">Gênero</label>
                            <select id="gender">
                                <option value="Masculino">Masculino</option>
                                <option value="Feminino">Feminino</option>
                                <option value="Outro">Outro</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="country">Reino / País</label>
                        <input type="text" id="country" required>
                    </div>

                    <button type="submit" class="btn success" style="margin-top: 10px;">Salvar Alterações</button>
                </form>
            </div>
        </main>
    </div>

    <script src="js/utils.js"></script>
    <script>
        if (!isAuthenticated()) window.location.href = 'index.html';

        async function loadProfile() {
            try {
                const data = await apiFetch('/auth/profile');
                
                // Preenche dados visuais (fixos)
                document.getElementById('display_nickname').textContent = data.nickname;
                document.getElementById('display_email').textContent = data.email;

                // Preenche dados do formulário editável
                document.getElementById('full_name').value = data.full_name;
                document.getElementById('age').value = data.age;
                document.getElementById('gender').value = data.gender;
                document.getElementById('country').value = data.country;
                
            } catch (error) {
                alert('Erro ao carregar perfil: ' + error.message);
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgBox = document.getElementById('msg');
            msgBox.className = '';
            msgBox.textContent = 'Feitiço de escrita ativado...';

            const payload = {
                full_name: document.getElementById('full_name').value,
                age: document.getElementById('age').value,
                gender: document.getElementById('gender').value,
                country: document.getElementById('country').value
            };

            try {
                const response = await apiFetch('/auth/profile', {
                    method: 'PUT',
                    body: JSON.stringify(payload)
                });

                msgBox.className = 'success-msg';
                msgBox.textContent = response.message || 'Perfil atualizado com sucesso!';
                setTimeout(()=> msgBox.textContent = '', 3000);
            } catch (error) {
                msgBox.className = 'error-msg';
                msgBox.textContent = error.message;
            }
        });

        window.onload = loadProfile;
    </script>
</body>
</html>
