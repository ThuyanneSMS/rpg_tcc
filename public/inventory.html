<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Web - Inventario</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        .item-card {
            background-color: #1c232c;
            border: 2px solid #555;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .item-card.equipped {
            border-color: #f1c40f;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.3);
            background: linear-gradient(145deg, #1c232c, rgba(241, 196, 15, 0.1));
        }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #34495e;
            padding-bottom: 5px;
        }
        .item-name { font-weight: bold; color: #ecf0f1; font-size: 1.1em; }
        .item-quantity { background-color: #34495e; padding: 2px 8px; border-radius: 12px; font-size: 0.9em; }
        .item-desc { font-size: 0.9em; color: #bdc3c7; margin-bottom: 15px; min-height: 40px; }
        .item-actions { display: flex; gap: 10px; }
        .empty-inv { text-align: center; color: #7f8c8d; font-style: italic; padding: 40px; grid-column: 1 / -1; }
    </style>
</head>
<body>
    <div class="rpg-container fade-in">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div>&#x1F3BA; Bau</div>
            </div>
            <ul class="menu-list">
                <li class="menu-item"><a href="game.html">&#x1F464; Status</a></li>
                <li class="menu-item active"><a href="inventory.html">&#x1F3BA; Inventario</a></li>
                <li class="menu-item"><a href="shop.html">&#x1F6D2; Mercador</a></li>
                <li class="menu-item"><a href="profile.html">&#x1F464; Minha Conta</a></li>
            </ul>
        </aside>
        <main class="main-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #555; margin-bottom: 20px; padding-bottom: 10px;">
                <h2 class="section-title" style="border-bottom: none; margin-bottom: 0; padding-bottom: 0;">Seus Pertences</h2>
                <a href="game.html" class="rpg-btn" style="width: auto; padding: 8px 15px; font-size: 0.8em;">Voltar</a>
            </div>
            <div id="msg"></div>
            <div class="inventory-grid" id="inventoryList">
                <div class="empty-inv">Carregando itens...</div>
            </div>
        </main>
    </div>

    <script src="js/utils.js"></script>
    <script>
        if (!isAuthenticated()) window.location.href = 'index.html';

        async function loadInventory() {
            const list = document.getElementById('inventoryList');
            const msgBox = document.getElementById('msg');
            msgBox.className = '';
            msgBox.textContent = '';

            try {
                const data = await apiFetch('/inventory/');

                if (!data.items || data.items.length === 0) {
                    list.innerHTML = '<div class="empty-inv">Sua mochila esta vazia. Visite o mercador ou batalhe por espolios!</div>';
                    return;
                }

                list.innerHTML = '';
                data.items.forEach(item => {
                    const isEquipable = item.item_type === 'sword' || item.item_type === 'shield';
                    const isConsumable = item.item_type === 'potion';

                    let actionBtn = '';
                    if (isEquipable) {
                        if (item.is_equipped) {
                            actionBtn = `<button class="btn danger" onclick="toggleEquip(${item.id}, false)">Desequipar</button>`;
                        } else {
                            actionBtn = `<button class="btn success" onclick="toggleEquip(${item.id}, true)">Equipar</button>`;
                        }
                    } else if (isConsumable) {
                        actionBtn = `<button class="btn success" onclick="useItem(${item.id})">Usar Item</button>`;
                    }

                    const bonusText = item.stat_bonus ? `+${item.stat_bonus} de Bonus` : '';
                    list.innerHTML += `
                        <div class="item-card ${item.is_equipped ? 'equipped' : ''}">
                            <div>
                                <div class="item-header">
                                    <span class="item-name">${item.item_name}</span>
                                    <span class="item-quantity">x${item.quantity}</span>
                                </div>
                                <div class="item-desc">
                                    <p>Tipo: ${item.item_type}</p>
                                    <p>${bonusText}</p>
                                </div>
                            </div>
                            <div class="item-actions">${actionBtn}</div>
                        </div>`;
                });

            } catch (error) {
                list.innerHTML = '<div class="error-msg">Falha ao carregar itens: ' + error.message + '</div>';
            }
        }

        async function toggleEquip(inventoryId, equipStatus) {
            try {
                await apiFetch('/inventory/equip', {
                    method: 'POST',
                    body: JSON.stringify({ inventoryId, equip: equipStatus })
                });
                loadInventory();
            } catch (error) {
                alert(error.message);
            }
        }

        async function useItem(inventoryId) {
            try {
                const response = await apiFetch('/inventory/use', {
                    method: 'POST',
                    body: JSON.stringify({ inventoryId })
                });
                alert(response.message);
                loadInventory();
            } catch (error) {
                alert(error.message);
            }
        }

        window.onload = loadInventory;
    </script>
</body>
</html>
