<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Web - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-nav { text-align: center; margin-bottom: 20px; font-family: 'Cinzel', serif;}
        .auth-nav a { color: #f1c40f; text-decoration: none; margin: 0 10px; font-size: 1.1em;}
        .auth-nav a:hover { text-shadow: 0 0 10px #f1c40f; }
        .logo-title { text-align: center; font-size: 3em; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container fade-in">
        <h1 class="logo-title cinzel">Odisseia Arcana</h1>
        <div class="auth-nav">
            <span style="color: #555;">[</span> <a href="index.html" style="text-decoration: underline;">Entrar</a> | <a href="register.html">Forjar Aliança</a> <span style="color: #555;">]</span>
        </div>

        <h2 style="font-size: 1.5em; color: #bdc3c7; border:none;">Os Portões da Guilda</h2>
        <div id="msg" class="error-msg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail do Aventureiro</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Senha Mágica</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn">Adentrar a Taberna</button>
        </form>
    </div>

    <script src="js/utils.js"></script>
    <script>
        // Redirect if already logged in
        if (isAuthenticated()) {
            window.location.href = 'game.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgBox = document.getElementById('msg');
            
            try {
                const data = await apiFetch('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });

                // Salva token e redireciona
                saveToken(data.token);
                window.location.href = 'game.html';

            } catch (error) {
                msgBox.className = 'error-msg';
                msgBox.textContent = error.message;
            }
        });
    </script>
</body>
</html>
