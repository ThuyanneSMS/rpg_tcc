<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>RPG Web - Combate</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .battle-arena {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a252f;
            border: 2px solid #555;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            position: relative;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://www.transparenttextures.com/patterns/black-scales.png');
        }

        .fighter {
            text-align: center;
            width: 40%;
            background: rgba(44, 62, 80, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #34495e;
        }

        .fighter h3 { margin-bottom: 10px; color: #fff; font-family: 'Cinzel', serif; font-size: 1.5em; }
        
        .hp-bar-container {
            width: 100%;
            background-color: #111;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
            border: 2px solid #222;
        }

        .hp-bar {
            height: 100%;
            background: linear-gradient(90deg, #c0392b, #e74c3c);
            width: 100%;
            transition: width 0.3s ease;
        }
        .hp-bar.player-hp { background: linear-gradient(90deg, #27ae60, #2ecc71); }

        .battle-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .battle-log {
            background-color: #111;
            border: 1px solid #34495e;
            padding: 15px;
            border-radius: 5px;
            height: 200px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 14px;
            color: #bdc3c7;
            font-family: 'Courier New', monospace;
        }
        .battle-log p { margin-bottom: 5px; border-bottom: 1px dashed #222; padding-bottom: 5px;}
        .log-dano { color: #e74c3c; }
        .log-cura { color: #2ecc71; }
        .log-info { color: #3498db; }
        
        .overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center; align-items: center;
            flex-direction: column; z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .overlay h1 { font-size: 50px; margin-bottom: 20px; text-shadow: 0 0 20px #e74c3c; color: #fff;}
        .overlay .dim { color: #bdc3c7; margin-bottom: 20px; font-size: 1.2em; text-align: center; }
    </style>
</head>
<body>
    
    <div class="rpg-container fade-in">
        
        <!-- Main Panel Full Width para a Batalha -->
        <main class="main-panel" style="grid-column: 1/-1; width:100%;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #555; margin-bottom: 20px; padding-bottom: 10px;">
                <h2 class="section-title" style="border-bottom: none; margin-bottom: 0; padding-bottom: 0; color: #e74c3c;">Zona de Combate</h2>
                <button onclick="flee()" class="rpg-btn danger" style="width: auto; padding: 8px 15px; font-size: 0.8em;">Fugir e Voltar</button>
            </div>

            <!-- Arena Visual -->
            <div class="battle-arena" id="arena" style="display: none;">
                <!-- Informaçăo do Jogador -->
                <div class="fighter">
                    <h3 id="playerName">Herói</h3>
                    <div class="hp-bar-container">
                        <div class="hp-bar player-hp" id="playerHpBar"></div>
                    </div>
                    <small id="playerHpText" style="color:#f1c40f; font-weight:bold;">HP: ?/?</small>
                </div>

                <div style="font-size: 32px; font-weight: bold; color: #e74c3c; font-family: 'Cinzel'; text-shadow: 0 0 10px #000;">VS</div>

                <!-- Informaçăo do Monstro -->
                <div class="fighter">
                    <h3 id="monsterName" style="color: #e67e22;">Monstro</h3>
                    <div class="hp-bar-container">
                        <div class="hp-bar" id="monsterHpBar"></div>
                    </div>
                    <small id="monsterHpText" style="color:#f1c40f; font-weight:bold;">HP: ?/?</small>
                </div>
            </div>

            <!-- Log de Combate -->
            <div class="battle-log" id="battleLog">
                <p class="log-info">Adentrando as profundezas...</p>
            </div>

            <!-- Açőes -->
            <div class="battle-actions" id="actions" style="display: none;">
                <button class="btn danger" onclick="turnAction('attack')">?? Atacar</button>
                <button class="btn" style="background: linear-gradient(#3498db, #2980b9); border-color: #3498db;" onclick="turnAction('defend')">??? Defender</button>
                <button class="btn success" onclick="turnAction('potion')">?? Usar Poçăo</button>
                <button class="btn" style="background: linear-gradient(#95a5a6, #7f8c8d); border-color: #bdc3c7;" onclick="turnAction('flee')">?? Fugir (Retirar-se)</button>
            </div>
            
            <div class="text-center" style="margin-top: 20px;">
               <button id="btnStart" class="btn danger" style="font-size: 1.2em; padding: 15px;" onclick="startBattle()">Procurar Inimigo</button>
            </div>
        </main>
    </div>

    <!-- Tela de Result -->
    <div class="overlay" id="resultOverlay">
        <h1 id="resTitle" class="cinzel">Vitória!</h1>
        <div class="dim" id="resDesc">Vocę ganhou X EXP e Y de Ouro.</div>
        <button class="btn success" style="width: 200px;" onclick="window.location.href='game.html'">Voltar ŕ Guilda</button>
    </div>

    <script src="js/utils.js"></script>
    <script>
        if (!isAuthenticated()) window.location.href = 'index.html';

        let playerMaxHp = 100;
        let monsterMaxHp = 100;

        function updateLog(msg, typeClass = '') {
            const logPanel = document.getElementById('battleLog');
            logPanel.innerHTML += <p class="\">> \</p>;
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function updateBars(p_hp, m_hp) {
            document.getElementById('playerHpText').textContent = HP: \/\;
            let pPercent = (p_hp / playerMaxHp) * 100;
            document.getElementById('playerHpBar').style.width = \%;

            document.getElementById('monsterHpText').textContent = HP: \/\;
            let mPercent = (m_hp / monsterMaxHp) * 100;
            document.getElementById('monsterHpBar').style.width = \%;
        }

        async function startBattle() {
            try {
                document.getElementById('btnStart').style.display = 'none';
                
                const data = await apiFetch('/battle/start', { method: 'POST' });
                
                playerMaxHp = data.player.max_hp;
                monsterMaxHp = data.monster.max_hp;

                document.getElementById('playerName').textContent = data.player.name;
                document.getElementById('monsterName').textContent = data.monster.name;
                
                updateBars(data.player.hp, data.monster.hp);

                document.getElementById('arena').style.display = 'flex';
                document.getElementById('actions').style.display = 'grid';
                
                document.getElementById('battleLog').innerHTML = '';
                updateLog(Um \ apareceu! Prepare-se para lutar., 'log-info');

            } catch (error) {
                alert(error.message);
                document.getElementById('btnStart').style.display = 'block';
            }
        }

        async function turnAction(actionType) {
            // Desabilita botoes pra nao spammar
            const btns = document.querySelectorAll('#actions button');
            btns.forEach(b => b.disabled = true);

            try {
                const data = await apiFetch('/battle/action', {
                    method: 'POST',
                    body: JSON.stringify({ action: actionType })
                });

                // Registrar logs do Backend
                if (data.log && data.log.length > 0) {
                    data.log.forEach(linha => {
                        let c = '';
                        if(linha.includes('dano')) c = 'log-dano';
                        if(linha.includes('recuperou')) c = 'log-cura';
                        updateLog(linha, c);
                    });
                }

                // Atualizar barras
                if (data.state) {
                    updateBars(data.state.playerHp, data.state.monsterHp);
                }

                // Checar Fim de Jogo
                if (data.status !== 'ongoing') {
                    setTimeout(() => finishBattle(data), 1500);
                } else {
                    btns.forEach(b => b.disabled = false);
                }

            } catch (error) {
                updateLog('Erro no turno: ' + error.message, 'log-dano');
                btns.forEach(b => b.disabled = false);
            }
        }
        
        async function flee() {
            try {
                await apiFetch('/battle/action', { method: 'POST', body: JSON.stringify({ action: 'flee' }) });
                window.location.href = 'game.html';
            } catch(e) { window.location.href = 'game.html'; }
        }

        function finishBattle(data) {
            const overlay = document.getElementById('resultOverlay');
            const tit = document.getElementById('resTitle');
            const desc = document.getElementById('resDesc');

            overlay.style.display = 'flex';

            if (data.status === 'won') {
                tit.textContent = 'VITÓRIA!';
                tit.style.color = '#f1c40f';
                desc.innerHTML = O inimigo caiu!<br><br>Ganhos:<br>? \ EXP<br>?? \ Ouro;
                
                if (data.rewards.leveledUp) {
                    desc.innerHTML += <br><br><span style="color:#2ecc71; font-weight:bold;">LEVEL UP! Vocę é agora nível \!</span>;
                }
            } else if (data.status === 'lost') {
                tit.textContent = 'DERROTA';
                tit.style.color = '#e74c3c';
                desc.textContent = 'Vocę sucumbiu aos ferimentos... O mundo escureceu.';
            } else if (data.status === 'fled') {
                tit.textContent = 'FUGA';
                tit.style.color = '#bdc3c7';
                desc.textContent = 'Vocę fugiu da batalha com segurança... covarde.';
            }
        }
    </script>
</body>
</html>
