<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>RPG Web - Batalha</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .battle-arena {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2c3e50;
            border: 2px solid #34495e;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .fighter {
            text-align: center;
            width: 40%;
        }

        .fighter h3 { margin-bottom: 10px; color: #fff; }
        
        .hp-bar-container {
            width: 100%;
            background-color: #555;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
            border: 2px solid #222;
        }

        .hp-bar {
            height: 100%;
            background-color: #e74c3c;
            width: 100%;
            transition: width 0.3s ease;
        }
        .hp-bar.player-hp { background-color: #2ecc71; }

        .battle-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .battle-log {
            background-color: #1a252f;
            padding: 15px;
            border-radius: 5px;
            height: 150px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 14px;
            color: #bdc3c7;
            font-family: monospace;
        }
        .battle-log p { margin-bottom: 5px; border-bottom: 1px dashed #34495e; padding-bottom: 3px;}
        
        .overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
            flex-direction: column; z-index: 1000;
        }
        .overlay h1 { font-size: 40px; margin-bottom: 20px; }
        .overlay .dim { color: #bdc3c7; margin-bottom: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>Zona de Combate</h1>
    </header>

    <div class="container" style="max-width: 800px; padding: 20px;">
        
        <!-- Arena Visual -->
        <div class="battle-arena" id="arena" style="display: none;">
            <!-- Informação do Jogador -->
            <div class="fighter">
                <h3 id="playerName">Herói</h3>
                <div class="hp-bar-container">
                    <div class="hp-bar player-hp" id="playerHpBar"></div>
                </div>
                <small id="playerHpText">HP: ?/?</small>
            </div>

            <div style="font-size: 24px; font-weight: bold; color: #e74c3c;">VS</div>

            <!-- Informação do Monstro -->
            <div class="fighter">
                <h3 id="monsterName">Monstro</h3>
                <div class="hp-bar-container">
                    <div class="hp-bar" id="monsterHpBar"></div>
                </div>
                <small id="monsterHpText">HP: ?/?</small>
            </div>
        </div>

        <!-- Log de Combate -->
        <div class="battle-log" id="battleLog">
            <p>Procurando inimigos...</p>
        </div>

        <!-- Ações -->
        <div class="battle-actions" id="actionPanel" style="display: none;">
            <button class="btn" onclick="sendAction('attack')" style="background-color: #e74c3c;">Ataque Físico</button>
            <button class="btn" onclick="sendAction('defend')" style="background-color: #3498db;">Defender (Dobrar Defesa)</button>
            <button class="btn" onclick="sendAction('potion')" style="background-color: #2ecc71;">Usar Poção</button>
            <button class="btn" onclick="sendAction('flee')" style="background-color: #95a5a6;">Tentar Fugir</button>
        </div>

    </div>

    <!-- Tela de Fim de Batalha (Vitória/Derrota) -->
    <div class="overlay" id="endScreen">
        <h1 id="endTitle">O Combate Terminou</h1>
        <p class="dim" id="endMessage">...</p>
        <button class="btn" style="max-width: 300px;" onclick="window.location.href='game.html'">Voltar para a Base</button>
    </div>

    <script src="js/utils.js"></script>
    <script>
        if (!isAuthenticated()) window.location.href = 'index.html';

        let playerMaxHp = 100;
        let monsterMaxHp = 100;

        async function initBattle() {
            try {
                // Pegar Info do Personagem primeiro pra compor o HUD inicial
                const charData = await apiFetch('/character');
                playerMaxHp = charData.character.base_health;
                document.getElementById('playerName').textContent = charData.character.name;

                // Iniciar batalha Endpoint
                const data = await apiFetch('/battle/start', { method: 'POST' });
                
                const m = data.battle || data.monster; // Pode vir da nova ou da q já estava salva no bd
                monsterMaxHp = m.max_hp;
                document.getElementById('monsterName').textContent = m.name || m.monster_name;

                // Mostrar arena
                document.getElementById('arena').style.display = 'flex';
                document.getElementById('actionPanel').style.display = 'grid';

                // Definir HPs Iniciais da Tela
                const initialPlayerHp = charData.character.current_health;
                const initialMonsterHp = m.hp || m.monster_hp;
                
                updateBars(initialPlayerHp, initialMonsterHp);

                logMessage(`[Sistema]: Um ${m.name || m.monster_name} selvagem apareceu! O que você faz?`);

            } catch (error) {
                logMessage(`Erro: ${error.message}`);
            }
        }

        async function sendAction(actionType) {
            // Trava os botões durante a requisição
            document.getElementById('actionPanel').style.pointerEvents = 'none';
            document.getElementById('actionPanel').style.opacity = '0.5';

            try {
                const res = await apiFetch('/battle/action', {
                    method: 'POST',
                    body: JSON.stringify({ action: actionType })
                });

                // Tocar Logs
                res.log.forEach(msg => logMessage(msg));

                // Atualizar Vida
                if (res.playerHealth !== undefined && res.monsterHealth !== undefined) {
                    updateBars(res.playerHealth, res.monsterHealth);
                }

                // Fim de Combate?
                if (res.battleStatus === 'ended' || res.battleStatus === 'ended_defeat' || actionType === 'flee') {
                    setTimeout(() => showEndScreen(res), 1500); // mostrar modal de fim
                }

            } catch (error) {
                logMessage(`Erro: ${error.message}`);
            } finally {
                // Destrava
                document.getElementById('actionPanel').style.pointerEvents = 'auto';
                document.getElementById('actionPanel').style.opacity = '1';
            }
        }

        function updateBars(pHp, mHp) {
            // Proteção contra número negativo na barra
            pHp = Math.max(0, pHp);
            mHp = Math.max(0, mHp);

            // Textos
            document.getElementById('playerHpText').textContent = `HP: ${pHp}/${playerMaxHp}`;
            document.getElementById('monsterHpText').textContent = `HP: ${mHp}/${monsterMaxHp}`;

            // Tamanho % Visual
            const pPct = (pHp / playerMaxHp) * 100;
            const mPct = (mHp / monsterMaxHp) * 100;

            document.getElementById('playerHpBar').style.width = `${pPct}%`;
            document.getElementById('monsterHpBar').style.width = `${mPct}%`;
        }

        function logMessage(msg) {
            const logBox = document.getElementById('battleLog');
            logBox.innerHTML += `<p>> ${msg}</p>`;
            // Autoscroll para o fim
            logBox.scrollTop = logBox.scrollHeight;
        }

        function showEndScreen(res) {
            const overlay = document.getElementById('endScreen');
            const title = document.getElementById('endTitle');
            const msg = document.getElementById('endMessage');

            overlay.style.display = 'flex';

            if (res.battleStatus === 'ended') {
                title.textContent = 'VITÓRIA!';
                title.style.color = '#2ecc71';
                msg.textContent = res.message;
            } else if (res.battleStatus === 'ended_defeat') {
                title.textContent = 'VOCÊ MORREU';
                title.style.color = '#e74c3c';
                msg.textContent = 'Você retornará para a cidade, ferido e saqueado de XP.';
            } else {
                title.textContent = 'FUGIU';
                title.style.color = '#f1c40f';
                msg.textContent = res.message;
            }
        }

        window.onload = initBattle;
    </script>
</body>
</html>
