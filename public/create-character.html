<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Web - Criar Herói</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container fade-in">
        <h2 style="margin-bottom: 5px;">Salăo de Criaçăo</h2>
        <p class="text-center" style="color: #bdc3c7; margin-bottom: 20px; font-style: italic;">Forje aqui o seu destino...</p>
        
        <div id="msg" class="error-msg"></div>

        <form id="createCharForm">
            <div class="form-group">
                <label for="name">Nome do Personagem</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="charClass">Classe</label>
                <select id="charClass">
                    <option value="Guerreiro">?? Guerreiro (Forte e Resistente)</option>
                    <option value="Arqueiro">?? Arqueiro (Rápido e Preciso)</option>
                    <option value="Mago">?? Mago (Poderoso Destruidor)</option>
                </select>
            </div>
            <button type="submit" class="btn">Iniciar Jornada</button>
        </form>
    </div>

    <script src="js/utils.js"></script>
    <script>
        if (!isAuthenticated()) window.location.href = 'index.html';

        document.getElementById('createCharForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('name').value,
                characterClass: document.getElementById('charClass').value
            };
            const msgBox = document.getElementById('msg');
            
            try {
                await apiFetch('/character/create', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                msgBox.className = 'success-msg';
                // Redireciona de volta p o dashboard
                msgBox.textContent = 'Personagem crido! Entrando no mundo...';
                setTimeout(() => {
                   window.location.href = 'game.html'; 
                }, 1500);

            } catch (error) {
                msgBox.className = 'error-msg';
                msgBox.textContent = error.message;
            }
        });
    </script>
</body>
</html>
